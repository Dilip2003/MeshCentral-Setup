services:
  - type: web
    name: meshcentral-adp
    runtime: node
    plan: starter
    
    # Build command
    buildCommand: npm install
    
    # Start command
    startCommand: node node_modules/meshcentral/meshcentral.js
    
    # Environment variables
    envVars:
      - key: NODE_ENV
        value: production
      - key: MESHCENTRAL_DOMAIN
        scope: build,runtime
        sync: false
      - key: MESHCENTRAL_EMAIL
        value: ajayajay142018@gmail.com
        scope: build,runtime
      - key: MESHCENTRAL_CERT
        scope: build,runtime
        sync: false
    
    # Disk for data persistence (required for certificates and database)
    disk:
      - name: meshcentral-data
        mountPath: /var/data/meshcentral
        sizeGB: 10
    
    # Port configuration
    port: 443
    
    # Health check
    healthCheckPath: /
    
    # Auto-deploy on git push
    autoDeploy: true
